---
layout: default
title: Home
---

<h1>{{ site.title }}</h1>

<p>{{ site.description }}</p>

<hr>

<h2>Posts</h2>

{% for post in site.posts %}
  <article>
    <p><small>{{ post.date | date: "%B %-d, %Y" }}</small></p>
    <h3>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    </h3>
  </article>
{% endfor %}
